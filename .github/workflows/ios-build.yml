name: iOS Build & Verify

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Compile Check iOS
    runs-on: macos-15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show Tool Versions
        run: |
          echo "=== Xcode ==="
          xcodebuild -version
          echo ""
          echo "=== Swift ==="
          swift --version

      - name: Type-Check All Swift Files
        run: |
          set -o pipefail

          SDK_PATH=$(xcrun --sdk iphonesimulator --show-sdk-path)

          echo "=== SDK: $SDK_PATH ==="
          echo ""
          echo "=== Files to check: ==="

          # Kumpulin semua file .swift (kecuali di folder .build / tersembunyi)
          SWIFT_FILES=$(find . -name "*.swift" \
            -not -path "./.build/*" \
            -not -path "./.swiftpm/*" \
            | sort)

          echo "$SWIFT_FILES"
          echo ""

          FILE_COUNT=$(echo "$SWIFT_FILES" | wc -l | tr -d ' ')
          echo "=== Total: $FILE_COUNT .swift files ==="
          echo ""

          # TYPE-CHECK: compile semua file sekaligus, tanpa linking
          # Ini ngecek SEMUA error: syntax, type mismatch, missing imports, etc.
          echo "=== Starting type-check ==="
          echo ""

          swiftc \
            -sdk "$SDK_PATH" \
            -target arm64-apple-ios17.0-simulator \
            -typecheck \
            -Xfrontend -enforce-exclusivity=checked \
            $SWIFT_FILES \
            2>&1 | tee build.log

          echo ""
          echo "=== Type-check finished ==="

      - name: Check Result
        run: |
          echo ""
          echo "╔══════════════════════════════════════════╗"
          echo "║          BUILD RESULT                    ║"
          echo "╚══════════════════════════════════════════╝"
          echo ""

          ERROR_COUNT=$(grep -c "error:" build.log || true)
          WARNING_COUNT=$(grep -c "warning:" build.log || true)

          echo "🔴 Errors  : $ERROR_COUNT"
          echo "🟡 Warnings: $WARNING_COUNT"
          echo ""

          if [ "$ERROR_COUNT" -gt 0 ]; then
            echo "╔══════════════════════════════════════════╗"
            echo "║  ❌ BUILD FAILED - ADA ERROR BRO!       ║"
            echo "╚══════════════════════════════════════════╝"
            echo ""
            echo "=== ERRORS ==="
            grep "error:" build.log || true
            echo ""
            echo "=== CARA PERBAIKI ==="
            echo "1. Buka file di VSCode, cek baris yang error"
            echo "2. Perbaiki, lalu:"
            echo "   git add ."
            echo "   git commit -m \"fix: perbaiki error compile\""
            echo "   git push origin main"
            exit 1
          else
            echo "╔══════════════════════════════════════════╗"
            echo "║  ✅ BUILD SUCCESS - AMAN BRO!           ║"
            echo "╚══════════════════════════════════════════╝"
            echo ""
            echo "Semua $FILE_COUNT file Swift bebas error."
            echo "Kode siap di-build di Xcode!"
          fi

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
